name: Integration Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test-code:
    name: Build & Test (Source)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate Tag
        run: echo "SANITIZED_TAG=gcp-test-source-${{ matrix.platform }}" | sed 's/\//-/g' >> $GITHUB_ENV

      - name: Build Test Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: testing/Dockerfile.source
          platforms: ${{ matrix.platform }}
          tags: ${{ env.SANITIZED_TAG }}
          load: true # Load image into local Docker daemon
          push: false

      - name: Run Test (Mock Metadata)
        run: |
          docker run --rm \
            --platform ${{ matrix.platform }} \
            --add-host metadata.google.internal:127.0.0.1 \
            ${{ env.SANITIZED_TAG }}

  test-install:
    name: Verify APT Install (Repo Health)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Install Test Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: testing/Dockerfile.apt
          tags: gcp-test-install
          load: true
          push: false

      - name: Run Install Test
        run: |
          docker run --rm \
            --add-host metadata.google.internal:127.0.0.1 \
            gcp-test-install

  test-beta-install:
    name: Verify Beta Install (RC Health)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Beta Install Test Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: testing/Dockerfile.apt
          build-args: |
            CHANNEL=beta
          tags: gcp-test-beta-install
          load: true
          push: false

      - name: Run Beta Install Test
        run: |
          docker run --rm \
            --add-host metadata.google.internal:127.0.0.1 \
            gcp-test-beta-install
